# DevSpirits — CI & Security Pipeline
# Brand: IdanLevianDeveloper | https://devspirits.com
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_NAME: DevSpirits
  PROJECT_URL: https://devspirits.com

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Enable Corepack (for Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Static security check
        run: yarn security:static

      - name: Security audit
        run: yarn npm audit --all --audit-level=high
        continue-on-error: true

      - name: Run ESLint
        run: yarn lint

      - name: Run TypeScript type check
        run: yarn tsc --noEmit

  snyk-sca:
    name: Snyk SCA (Dependencies)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Enable Corepack (for Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all
          command: test

  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Snyk Code
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Enable Corepack (for Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, snyk-sca, snyk-code, unit-tests]
    if: always() && (needs.lint-and-typecheck.result == 'success') && (needs.unit-tests.result == 'success') && (needs.snyk-sca.result == 'success' || needs.snyk-sca.result == 'skipped') && (needs.snyk-code.result == 'success' || needs.snyk-code.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Enable Corepack (for Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build application
        run: yarn build
        env:
          NODE_ENV: production

      - name: Check for exposed source maps in build output
        run: |
          if [ -d .next/static/chunks ]; then
            MAP_COUNT=$(find .next -name "*.map" 2>/dev/null | wc -l)
            echo "Source maps in build: $MAP_COUNT"
          fi

  e2e-security:
    name: E2E Security Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Enable Corepack (for Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn exec playwright install --with-deps chromium

      - name: Build application
        run: yarn build
        env:
          NODE_ENV: production

      - name: Run Playwright security tests
        run: yarn test:e2e
        env:
          CI: true
